<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization - CSV Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1><i class="fas fa-chart-line"></i> CSV Analyzer</h1>
            <nav>
                <ul>
                    <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="/data"><i class="fas fa-table"></i> Data</a></li>
                    <li><a href="/visualize" class="active"><i class="fas fa-chart-bar"></i> Visualize</a></li>
                    <li><a href="/predict"><i class="fas fa-brain"></i> Predict</a></li>
                    <li><a href="/download"><i class="fas fa-download"></i> Download</a></li>
                </ul>
            </nav>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="card">
            <h2><i class="fas fa-chart-bar"></i> Data Visualizations</h2>
            <p>Explore your data through interactive charts and graphs powered by Plotly.</p>
            <div id="plots" class="plot-container">
                {{ plots|safe }}
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="dashboard-container">
            <p>&copy; 2024 CSV Analyzer Dashboard. Built with Flask and modern web technologies.</p>
        </div>
    </footer>
</body>
</html>
